services:
  adguardhome:
    image: adguard/adguardhome
    container_name: adguardhome
    restart: unless-stopped
    ports:
      - '53:53/tcp'
      - '53:53/udp'
      - '3000:3000/tcp'
      - '80:80/tcp'
    volumes:
      - /data/adguard-home/conf:/opt/adguardhome/conf
      - /data/adguard-home/work:/opt/adguardhome/work
